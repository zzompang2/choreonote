{% extends 'layout.html' %}

{% block style %}
<link rel="stylesheet" href="/css/note.css">
{% endblock %}

{% block header %}
<div id="save_btn" class="btn_text">
  저장하기
</div>
{% endblock %}

{% block sidebar %}
<div class="sidebar_group">
  <div class="sidebar_header"><span>무대 설정</span></div>
  <label tabindex="0" class="sidebar_button">
    <input class="checkbox" type="checkbox" id="coordinate_btn">격자 보기</label>
  <label tabindex="0" class="sidebar_button">
    <input class="checkbox" type="checkbox" id="snap_btn">격자에 맞추기</label>
  <label tabindex="0" class="sidebar_button">
    <input class="checkbox" type="checkbox" id="dancer_name_btn">댄서 이름으로 보기</label>
  <label tabindex="0" class="sidebar_button">
    <input class="checkbox" type="checkbox" id="rotate_btn">무대 회전</label>
  <label tabindex="0" class="sidebar_button">
    <input class="checkbox" type="checkbox" id="slope_btn">무대 3D</label>
</div>
<div class="sidebar_group">
  <div class="sidebar_header"><span>댄서</span></div>
  <div tabindex="0" class="sidebar_button">1. 함창수</div>
  <div tabindex="0" class="sidebar_button">2. 쫌팡이</div>
</div>
{% endblock %}

{% block body %}

<!-- STAGE -->
<div id="stage_section" class="stage">
  <div id="stage_wrap" class="stage__wrap">
    <div id="stage_axis" class="stage__axis"></div>
    <div id="stage_dancer" class="stage__dancer"></div>
  </div>
</div>

<div id="player_section">
  <div id="track">
  	<div id="progress" style="width: 0; transition-duration: 0s;"></div>
  </div>
  <div id="time_and_btn">
    <div id="curtime_text" class="time_number">
      <div class="min_sec">0:00.</div>
      <div class="millisec">000</div>
    </div>
    <div id="btn_container">
      <div id="add_btn" class="icon_btn">
        <object id="add" type="image/svg+xml" data="./assets/icons/Large(32)/Add.svg"></object>
      </div>
      <div id="play_btn" class="icon_btn">
        <object id="play" type="image/svg+xml" data="./assets/icons/Large(32)/Play.svg"></object>
        <object id="pause" type="image/svg+xml" data="./assets/icons/Large(32)/Pause.svg" style="display: none;"></object>
      </div>
    </div>
    <div id="duration_text" class="time_number">
      <div class="min_sec">0:00.</div>
      <div class="millisec">000</div>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<section id="timeline_section">
  <div id="container">
    
    <div id="time_ruler">
      <div id="time_number">
        <!-- <div style="width: ??px;"></div> -->
        <!-- <div class="number" id="0" style="width: 40px;">0:00</div> -->
      </div>
      <div id="time_scale">
        <!-- <div style="width: ??px;"></div> -->
        <!-- <div id="0" class="scale_wrap" style="width: 10px;">
          <div class="scale" style="height: 8px;"></div></div> -->
      </div>
    </div>
    
    <div id="formation_box_section">
      <!-- <div id="0" class="formation_box" style="width: 80px; left: 60px;">
        <div class="formationBox__body" draggable="true"></div>
        <div draggable="true" class="handler left"></div>
        <div draggable="true" class="handler right"></div>
      </div> -->
  	</div>
    
    <div id="divider"></div>
    
    <div id="time_marker">
      <div id="line" draggable="false"></div>
      <div id="handle" draggable="true"></div>
    </div>
    
  </div>
  
</section>

<section id="tool_section">
  <div id="copy_btn" class="btn">복사하기</div>
  <div id="paste_btn" class="btn">붙여넣기</div>
  <div id="delete_btn" class="btn">삭제</div>
</section>

<audio id="audio" preload="metadata">
  <source type="audio/mp3">
</audio>
{% endblock %}

{% block script %}
<script src="/js/note.js" type="module"></script>
{% endblock %}
