{% extends 'layout/layout-dashboard.html' %}

{% block innerstyle %}
<link rel="stylesheet" href="/css/profile.css">
{% endblock %}

{% block innerbody %}
<div class="profile_section">
  <label class="profile__row">
  	<div class="profile__label">닉네임</div>
    <div id="profile_nickname_container" class="profile__inputContainer">
    	<input id="profile_nickname" class="profile__input" placeholder="닉네임" disabled>
      <div id="edit_nickname" class="profile__editInput">수정하기</div>
      <div id="complete_nickname" class="profile__editInput" style="display: none">완료</div>
    </div>
  </label>
  <label class="profile__row">
  	<div class="profile__label">이메일</div>
    <div class="profile__inputContainer">
    	<div id="profile_email" class="profile__input"></div>
      <div id="profile_service" class="profile__serviceTag"></div>
    </div>
  </label>
  
  <div class="profile__row">
  	<div class="profile__label">비밀번호</div>
    <div id="password_input_container" class="profile__inputContainer">
    	<input id="password_input" type="password" class="profile__input" placeholder="현재 비밀번호" value="****" disabled>
      <div id="edit_password" class="profile__editInput" style="display: none">수정하기</div>
    </div>
    <div id="new_password_input_container" class="profile__inputContainer" style="display: none">
    	<input id="new_password_input" type="password" class="profile__input" placeholder="새로운 비밀번호">
    </div>
    <div id="new_password_check_input_container" class="profile__inputContainer" style="display: none">
    	<input id="new_password_check_input" type="password" class="profile__input" placeholder="새로운 비밀번호 확인">
    </div>
    <div id="complete_password" class="profile__editInput" style="display: none">완료</div>
  </div>
</div>
{% endblock %}

{% block innerscript %}
<script type="module" src="/js/profile.js"></script>
{% endblock %}
