{% extends 'layout/layout-dashboard.html' %}

{% block innerstyle %}
<link rel="stylesheet" href="/css/dashboard.css">
{% endblock %}

{% block innerbody %}
<div id="note_container" class="grid">

  <div class="note__createContainer">
    <div class="note__body">
      <div class="note__create">
        <div class="logo"></div>
        <div>
          당신의 멋진 무대를 위해.
        </div>
      </div>
      <div class="note__buttonPart">
        <div tabindex="0" id="create_note_btn" class="text__button"><span>노트 만들기</span></div>
      </div>
    </div>
  </div>

</div>

<div id="note_contextMenu" class="dropdown" style="display: none">
  <div id="delete_button" class="dropdown__item">
    <div class="dropdown__item_text">삭제하기</div>
  </div>
</div>
{% endblock %}

{% block innerscript %}
<script type="module" src="/js/dashboard.js"></script>
{% endblock %}
